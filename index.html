<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Planilla Naranja</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont;
    background: linear-gradient(135deg, #fff7ed, #ffedd5);
    margin: 0;
}

/* HEADER */
header {
    background: white;
    padding: 20px;
    font-size: 24px;
    font-weight: 600;
    border-bottom: 1px solid #eee;
}

/* CONTENEDOR */
.container {
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

/* BOTÓN */
button {
    background: #ff6a00;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 20px;
    font-weight: 600;
}

/* TARJETAS */
.card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.02);
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

/* ESTADOS */
.badge {
    padding: 5px 10px;
    border-radius: 10px;
    font-size: 12px;
}

.pendiente { background: #fde68a; }
.proceso { background: #93c5fd; }
.listo { background: #86efac; }

</style>
</head>

<body>

<header>🍊 Planilla Naranja</header>

<div class="container">

<button onclick="crear()">➕ Nueva tarea</button>

<div id="app"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://bwqgitkxwtdfogbexzbj.supabase.co";
const SUPABASE_KEY = "sb_publishable_35vtzbLtCkQt8yevQ4PF-A_3oyRO93W";

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 📥 CARGAR
async function load() {
    const { data } = await client.from('tareas').select('*').order('id');

    if (!data || data.length === 0) {
        document.getElementById("app").innerHTML = "No hay tareas aún";
        return;
    }

    render(data);
}

// 🎨 RENDER
function render(tareas) {
    const app = document.getElementById("app");
    app.innerHTML = "";

    tareas.forEach(t => {

        let estadoClass = "pendiente";
        if (t.estado === "En proceso") estadoClass = "proceso";
        if (t.estado === "Listo") estadoClass = "listo";

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${t.nombre}</h3>
            <span class="badge ${estadoClass}">${t.estado}</span><br><br>

            Tipo: ${t.tipo}<br><br>

            Responsable:
            <input value="${t.responsable || ""}" 
            onchange="update(${t.id}, 'responsable', this.value)">

            Costo:
            <input value="${t.costo || ""}" 
            onchange="update(${t.id}, 'costo', this.value)">

            Estado:
            <select onchange="update(${t.id}, 'estado', this.value)">
                <option ${t.estado=="Pendiente"?"selected":""}>Pendiente</option>
                <option ${t.estado=="En proceso"?"selected":""}>En proceso</option>
                <option ${t.estado=="Listo"?"selected":""}>Listo</option>
            </select>

            <button onclick="eliminar(${t.id})" style="background:#ef4444;">Eliminar</button>
        `;

        app.appendChild(div);
    });
}

// ➕ CREAR
async function crear() {
    const nombre = prompt("Nombre de la tarea");
    if (!nombre) return;

    await client.from('tareas').insert([{
        nombre,
        tipo: "Nuevo",
        estado: "Pendiente"
    }]);

    load();
}

// 🔄 UPDATE
async function update(id, field, value) {
    await client.from('tareas').update({ [field]: value }).eq('id', id);
}

// ❌ ELIMINAR
async function eliminar(id) {
    await client.from('tareas').delete().eq('id', id);
}

// 🔴 REALTIME
client
  .channel('tareas')
  .on('postgres_changes',
    { event: '*', schema: 'public', table: 'tareas' },
    () => load()
  )
  .subscribe();

load();
</script>

</body>
</html>
