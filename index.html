<body>

<h1>Planilla Naranja - Dashboard</h1>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://bwqgitkxwtdfogbexzbj.supabase.co";
const SUPABASE_KEY = "sb_publishable_35vtzbLtCkQt8yevQ4PF-A_3oyRO93W";

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function load() {
    const { data, error } = await client.from('tareas').select('*');

    if (error) {
        console.error(error);
        document.getElementById("app").innerText = "Error";
        return;
    }

    document.getElementById("app").innerText = JSON.stringify(data, null, 2);
}

load();
</script>
